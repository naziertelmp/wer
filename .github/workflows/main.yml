name: Linux Remote Desktop

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: System Update
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y

      - name: Install Desktop and VNC
        run: |
          sudo apt-get install -y xfce4 xfce4-goodies tigervnc-standalone-server tigervnc-common curl wget git

      - name: Create User
        run: |
          sudo useradd -m -s /bin/bash toolboxlap
          echo "toolboxlap:admin@123" | sudo chpasswd
          sudo usermod -aG sudo toolboxlap

      - name: Configure VNC
        run: |
          sudo -u toolboxlap mkdir -p /home/toolboxlap/.vnc
          echo "admin@123" | sudo -u toolboxlap vncpasswd -f > /home/toolboxlap/.vnc/passwd
          sudo -u toolboxlap chmod 600 /home/toolboxlap/.vnc/passwd
          sudo -u toolboxlap bash -c 'cat > /home/toolboxlap/.vnc/xstartup << EOF
          #!/bin/bash
          startxfce4 &
          EOF'
          sudo -u toolboxlap chmod +x /home/toolboxlap/.vnc/xstartup
          sudo -u toolboxlap vncserver :1 -depth 24 -geometry 1280x800 -localhost no &
          sleep 3

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscaled --state=/var/lib/tailscale/tailscaled.state &
          sleep 3

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-desktop-$GITHUB_RUN_ID
          sleep 10
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Show Info
        run: |
          echo "VNC: ${{ env.TAILSCALE_IP }}:5901"
          echo "SSH: ssh toolboxlap@${{ env.TAILSCALE_IP }}"
          echo "Password: admin@123"

      - name: Keep Alive
        run: |
          while true; do
            sleep 300
            echo "Running..."
          done
